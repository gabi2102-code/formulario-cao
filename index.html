<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
 div class="container">
 <h3>Cadastro</h3>
<form id="formulario">

 <label for="nome">Nome:</label>
 <input type="text" id="nome" placeholder="Nome" required>
 <div id="erroNome" class="erro"></div>
 
<label for="email">Email:</label>
<input type="email" id="email" placeholder="Email" required>
<div id="erroEmail" class="erro"></div>

<label for="telefone">Telefone:</label>
<input type="text" id="telefone" placeholder="Telefone" required>
<div id="erroTelefone" class="erro"></div>

<label for="idade">Idade:</label>
 <input type="number" id="idade" placeholder="Idade" required>
<div id="erroIdade" class="erro"></div>

<label for="cidade">Cidade:</label>
<input type="text" id="cidade" placeholder="Cidade" required>
<div id="erroCidade" class="erro"></div>

<label>Moradia:</label>
 <input type="radio" name="moradia" value="apartamento"> Apartamento
<input type="radio" name="moradia" value="casa"> Casa
 <div id="erroMoradia" class="erro"></div>

<label>Sua moradia tem quintal:</label>
<input type="radio" name="quintal" value="sim"> Sim
<input type="radio" name="quintal" value="nao"> Não
 <div id="erroQuintal" class="erro"></div>





</body>
</html>
